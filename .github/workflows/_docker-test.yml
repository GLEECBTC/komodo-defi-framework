# Reusable workflow for docker-based test suites
# Called by test.yml for each docker test job
name: Docker Test Suite

on:
  workflow_call:
    inputs:
      name:
        description: 'Display name for the test suite'
        required: true
        type: string
      features:
        description: 'Cargo feature flags (e.g., docker-tests-slp)'
        required: true
        type: string
      compose-profiles:
        description: 'Docker compose profiles (e.g., "--profile slp" or "--profile utxo --profile qrc20")'
        required: true
        type: string
      timeout:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 60
      needs-zcash-params:
        description: 'Whether to fetch zcash params'
        required: false
        type: boolean
        default: true
      needs-nodes-setup:
        description: 'Whether to run docker-test-nodes-setup.sh'
        required: false
        type: boolean
        default: false
      nodes-setup-args:
        description: 'Arguments for docker-test-nodes-setup.sh (e.g., "--skip-cosmos")'
        required: false
        type: string
        default: ''
      container-wait-time:
        description: 'Seconds to wait after starting containers'
        required: false
        type: number
        default: 15
    secrets:
      BOB_PASSPHRASE:
        required: true
      BOB_USERPASS:
        required: true
      ALICE_PASSPHRASE:
        required: true
      ALICE_USERPASS:
        required: true
      TELEGRAM_API_KEY:
        required: false

jobs:
  test:
    name: Docker / ${{ inputs.name }}
    timeout-minutes: ${{ inputs.timeout }}
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        if: ${{ inputs.needs-zcash-params }}
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Prepare docker test environment
        if: ${{ inputs.needs-nodes-setup }}
        run: ./scripts/ci/docker-test-nodes-setup.sh ${{ inputs.nodes-setup-args }}

      - name: Start docker nodes
        run: |
          docker compose -f .docker/test-nodes.yml ${{ inputs.compose-profiles }} up -d
          echo "Waiting for containers to initialize..."
          sleep ${{ inputs.container-wait-time }}
          docker compose -f .docker/test-nodes.yml ps

      - name: Run tests
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: cargo test --test 'docker_tests_main' --features ${{ inputs.features }} --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v
