name: Test
on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FROM_SHARED_RUNNER: true

jobs:
  linux-x86-64-unit:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          cargo test --bins --lib --no-fail-fast

  mac-x86-64-unit:
    timeout-minutes: 90
    runs-on: macos-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_MACOS }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_MACOS }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_MACOS }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_MACOS }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          cargo test --bins --lib --no-fail-fast

  win-x86-64-unit:
    timeout-minutes: 90
    runs-on: windows-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_WIN }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_WIN }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_WIN }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_WIN }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          cargo test --bins --lib --no-fail-fast

  linux-x86-64-kdf-integration:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/635112d590618165a152dfa0f31e95a9be39a8f6/zcutil/fetch-params-alt.sh | bash
          cargo test --test 'mm2_tests_main' --no-fail-fast

  mac-x86-64-kdf-integration:
    timeout-minutes: 90
    runs-on: macos-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_MACOS }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_MACOS }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_MACOS }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_MACOS }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Set loopback address
        run: ./scripts/ci/lo0_config.sh

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/635112d590618165a152dfa0f31e95a9be39a8f6/zcutil/fetch-params-alt.sh | bash
          cargo test --test 'mm2_tests_main' --no-fail-fast

  win-x86-64-kdf-integration:
    timeout-minutes: 90
    runs-on: windows-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_WIN }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_WIN }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_WIN }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_WIN }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Download wget64
        uses: ./.github/actions/download-and-verify
        with:
          url: "https://github.com/KomodoPlatform/komodo/raw/d456be35acd1f8584e1e4f971aea27bd0644d5c5/zcutil/wget64.exe"
          output_file: "/wget64.exe"
          checksum: "d80719431dc22b0e4a070f61fab982b113a4ed9a6d4cf25e64b5be390dcadb94"

      - name: Test
        run: |
          Invoke-WebRequest -Uri https://raw.githubusercontent.com/KomodoPlatform/komodo/635112d590618165a152dfa0f31e95a9be39a8f6/zcutil/fetch-params-alt.bat -OutFile \cmd.bat && \cmd.bat
          cargo test --test 'mm2_tests_main' --no-fail-fast

  # SLP tests - isolated BCH/SLP token tests (FORSLP node only)
  # Uses docker-tests-slp feature flag to compile only SLP tests
  docker-tests-slp:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start SLP node
        run: |
          docker compose -f .docker/test-nodes.yml --profile slp up -d
          echo "Waiting for SLP container..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test SLP
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-slp --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Sia-only docker tests
  docker-tests-sia:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Prepare Sia node
        run: ./scripts/ci/docker-test-nodes-setup.sh --skip-cosmos

      - name: Start Sia node
        run: |
          docker compose -f .docker/test-nodes.yml --profile sia up -d
          echo "Waiting for Sia container..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test Sia
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-sia --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # ETH/EVM tests - isolated Ethereum and ERC20 tests (GETH node only)
  # Uses docker-tests-eth feature flag to compile only ETH tests
  docker-tests-eth:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Start ETH node
        run: |
          docker compose -f .docker/test-nodes.yml --profile evm up -d
          echo "Waiting for GETH container..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ETH
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-eth --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Ordermatching tests - order lifecycle, matching, volume, persistence
  # Requires UTXO + ETH nodes (cross-chain ordermatching tests in docker_tests_inner)
  docker-tests-ordermatch:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO and ETH nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo --profile evm up -d
          echo "Waiting for containers..."
          sleep 25
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ordermatching
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-ordermatch --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # UTXO swap protocol tests - v1/v2 swap mechanics, file locks, conf sync
  # Requires only UTXO nodes
  docker-tests-swaps-utxo:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo up -d
          echo "Waiting for UTXO containers..."
          sleep 20
          docker compose -f .docker/test-nodes.yml ps

      - name: Test UTXO swaps
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-swaps-utxo --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Watcher tests - watcher flows, refunds, rewards, restart behavior
  # Requires UTXO + ETH nodes
  docker-tests-watchers:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO and ETH nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo --profile evm up -d
          echo "Waiting for containers..."
          sleep 25
          docker compose -f .docker/test-nodes.yml ps

      - name: Test watchers
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-watchers --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # QRC20/Qtum tests - Qtum coin and QRC20 token tests
  # Requires only Qtum node
  docker-tests-qrc20:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Start Qtum node
        run: |
          docker compose -f .docker/test-nodes.yml --profile qrc20 up -d
          echo "Waiting for Qtum container..."
          sleep 20
          docker compose -f .docker/test-nodes.yml ps

      - name: Test QRC20
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-qrc20 --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Tendermint/Cosmos tests - Cosmos chain and IBC tests
  # Requires Cosmos nodes (Nucleus, Atom, IBC-Relayer)
  docker-tests-tendermint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Prepare docker test environment
        run: ./scripts/ci/docker-test-nodes-setup.sh

      - name: Start Cosmos nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile cosmos up -d
          echo "Waiting for Cosmos containers..."
          sleep 30
          docker compose -f .docker/test-nodes.yml ps

      - name: Test Tendermint
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_ZOMBIE_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-tendermint --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # ZCoin/Zombie tests - Zcash-based coin tests
  # Requires only Zombie node
  docker-tests-zcoin:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start Zombie node
        run: |
          docker compose -f .docker/test-nodes.yml --profile zombie up -d
          echo "Waiting for Zombie container..."
          sleep 30
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ZCoin
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
          _KDF_NO_UTXO_DOCKER: "1"
          _KDF_NO_SLP_DOCKER: "1"
          _KDF_NO_QTUM_DOCKER: "1"
          _KDF_NO_ETH_DOCKER: "1"
          _KDF_NO_COSMOS_DOCKER: "1"
          _KDF_NO_SIA_DOCKER: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-zcoin --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Remaining docker tests (all other nodes, excludes feature-flagged tests)
  docker-tests:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Prepare docker test environment
        run: ./scripts/ci/docker-test-nodes-setup.sh

      - name: Start docker test nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile all up -d
          echo "Waiting for containers to initialize..."
          sleep 30
          docker compose -f .docker/test-nodes.yml ps

      - name: Test
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: cargo test --test 'docker_tests_main' --features run-docker-tests --no-fail-fast

      - name: Stop docker test nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  wasm:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Install wasm-pack
        # Use the latest wasm-pack for up-to-date compatibility coverage on KDF.
        # As we don't share any build artifacts from this pipeline, we don't need
        # to lock the version here.
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Download geckodriver
        uses: ./.github/actions/download-and-verify
        with:
          url: "https://github.com/mozilla/geckodriver/releases/download/v0.32.2/geckodriver-v0.32.2-linux64.tar.gz"
          output_file: "geckodriver-v0.32.2-linux64.tar.gz"
          checksum: "1eab226bf009599f5aa1d77d9ed4c374e10a03fd848b500be1b32cefd2cbec64"

      - name: Install firefox and geckodriver
        run: |
          sudo apt-get update -y
          sudo apt-get install -y firefox
          sudo tar -xzvf geckodriver-v0.32.2-linux64.tar.gz -C /bin
          sudo chmod +x /bin/geckodriver

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: WASM_BINDGEN_TEST_TIMEOUT=1200 GECKODRIVER=/bin/geckodriver wasm-pack test --firefox --headless mm2src/mm2_main
