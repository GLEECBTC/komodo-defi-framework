name: Test
on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FROM_SHARED_RUNNER: true

jobs:
  unit:
    name: Unit / ${{ matrix.os-name }}
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            bob-passphrase-secret: BOB_PASSPHRASE_LINUX
            bob-userpass-secret: BOB_USERPASS_LINUX
            alice-passphrase-secret: ALICE_PASSPHRASE_LINUX
            alice-userpass-secret: ALICE_USERPASS_LINUX
          - os: macos-latest
            os-name: macOS
            bob-passphrase-secret: BOB_PASSPHRASE_MACOS
            bob-userpass-secret: BOB_USERPASS_MACOS
            alice-passphrase-secret: ALICE_PASSPHRASE_MACOS
            alice-userpass-secret: ALICE_USERPASS_MACOS
          - os: windows-latest
            os-name: Windows
            bob-passphrase-secret: BOB_PASSPHRASE_WIN
            bob-userpass-secret: BOB_USERPASS_WIN
            alice-passphrase-secret: ALICE_PASSPHRASE_WIN
            alice-userpass-secret: ALICE_USERPASS_WIN
    env:
      BOB_PASSPHRASE: ${{ secrets[matrix.bob-passphrase-secret] }}
      BOB_USERPASS: ${{ secrets[matrix.bob-userpass-secret] }}
      ALICE_PASSPHRASE: ${{ secrets[matrix.alice-passphrase-secret] }}
      ALICE_USERPASS: ${{ secrets[matrix.alice-userpass-secret] }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: |
          cargo test --bins --lib --no-fail-fast

  integration:
    name: Integration / ${{ matrix.os-name }}
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            bob-passphrase-secret: BOB_PASSPHRASE_LINUX
            bob-userpass-secret: BOB_USERPASS_LINUX
            alice-passphrase-secret: ALICE_PASSPHRASE_LINUX
            alice-userpass-secret: ALICE_USERPASS_LINUX
          - os: macos-latest
            os-name: macOS
            bob-passphrase-secret: BOB_PASSPHRASE_MACOS
            bob-userpass-secret: BOB_USERPASS_MACOS
            alice-passphrase-secret: ALICE_PASSPHRASE_MACOS
            alice-userpass-secret: ALICE_USERPASS_MACOS
          - os: windows-latest
            os-name: Windows
            bob-passphrase-secret: BOB_PASSPHRASE_WIN
            bob-userpass-secret: BOB_USERPASS_WIN
            alice-passphrase-secret: ALICE_PASSPHRASE_WIN
            alice-userpass-secret: ALICE_USERPASS_WIN
    env:
      BOB_PASSPHRASE: ${{ secrets[matrix.bob-passphrase-secret] }}
      BOB_USERPASS: ${{ secrets[matrix.bob-userpass-secret] }}
      ALICE_PASSPHRASE: ${{ secrets[matrix.alice-passphrase-secret] }}
      ALICE_USERPASS: ${{ secrets[matrix.alice-userpass-secret] }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Set loopback address (macOS)
        if: matrix.os == 'macos-latest'
        run: ./scripts/ci/lo0_config.sh

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Download wget64 (Windows)
        if: matrix.os == 'windows-latest'
        uses: ./.github/actions/download-and-verify
        with:
          url: "https://github.com/KomodoPlatform/komodo/raw/d456be35acd1f8584e1e4f971aea27bd0644d5c5/zcutil/wget64.exe"
          output_file: "/wget64.exe"
          checksum: "d80719431dc22b0e4a070f61fab982b113a4ed9a6d4cf25e64b5be390dcadb94"

      - name: Fetch zcash params (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/635112d590618165a152dfa0f31e95a9be39a8f6/zcutil/fetch-params-alt.sh | bash

      - name: Fetch zcash params (Windows)
        if: matrix.os == 'windows-latest'
        run: Invoke-WebRequest -Uri https://raw.githubusercontent.com/KomodoPlatform/komodo/635112d590618165a152dfa0f31e95a9be39a8f6/zcutil/fetch-params-alt.bat -OutFile \cmd.bat && \cmd.bat

      - name: Test
        run: cargo test --test 'mm2_tests_main' --no-fail-fast

  # SLP tests - isolated BCH/SLP token tests (FORSLP node only)
  # Uses docker-tests-slp feature flag to compile only SLP tests
  docker-tests-slp:
    name: Docker / SLP
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start SLP node
        run: |
          docker compose -f .docker/test-nodes.yml --profile slp up -d
          echo "Waiting for SLP container..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test SLP
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-slp --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Sia docker tests - Sia + UTXO for DSIA<->MYCOIN swap tests
  # sia_tests module contains swap tests between Sia and MYCOIN
  docker-tests-sia:
    name: Docker / Sia
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Prepare nodes
        run: ./scripts/ci/docker-test-nodes-setup.sh --skip-cosmos

      - name: Start Sia and UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile sia --profile utxo up -d
          echo "Waiting for containers..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test Sia
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-sia --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # ETH/EVM tests - isolated Ethereum and ERC20 tests (GETH node only)
  # Uses docker-tests-eth feature flag to compile only ETH tests
  docker-tests-eth:
    name: Docker / ETH
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Start ETH node
        run: |
          docker compose -f .docker/test-nodes.yml --profile evm up -d
          echo "Waiting for GETH container..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ETH
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-eth --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Ordermatching tests - UTXO-only order lifecycle, matching, volume, persistence
  # Cross-chain ordermatching tests moved to docker-tests-integration
  docker-tests-ordermatch:
    name: Docker / Ordermatch (UTXO)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo up -d
          echo "Waiting for containers..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ordermatching
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-ordermatch --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # UTXO swap protocol tests - v1/v2 swap mechanics, file locks, conf sync
  # Requires only UTXO nodes
  docker-tests-swaps-utxo:
    name: Docker / Swaps (UTXO)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo up -d
          echo "Waiting for UTXO containers..."
          sleep 20
          docker compose -f .docker/test-nodes.yml ps

      - name: Test UTXO swaps
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-swaps-utxo --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Watcher tests - UTXO-only watcher flows, refunds, rewards, restart behavior
  # ETH watcher tests are disabled by default (unstable, behind docker-tests-watchers-eth feature)
  # Requires UTXO nodes only
  docker-tests-watchers:
    name: Docker / Watchers (UTXO)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile utxo up -d
          echo "Waiting for containers..."
          sleep 15
          docker compose -f .docker/test-nodes.yml ps

      - name: Test watchers
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-watchers --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # QRC20/Qtum tests - Qtum coin and QRC20 token tests
  # Requires Qtum + UTXO nodes for cross-chain swap tests (QTUM/MYCOIN pairs)
  docker-tests-qrc20:
    name: Docker / QRC20
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start Qtum and UTXO nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile qrc20 --profile utxo up -d
          echo "Waiting for containers..."
          sleep 20
          docker compose -f .docker/test-nodes.yml ps

      - name: Test QRC20
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-qrc20 --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Tendermint/Cosmos tests - Cosmos chain and IBC tests
  # Requires Cosmos nodes (Nucleus, Atom, IBC-Relayer)
  docker-tests-tendermint:
    name: Docker / Tendermint
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Prepare docker test environment
        run: ./scripts/ci/docker-test-nodes-setup.sh

      - name: Start Cosmos nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile cosmos up -d
          echo "Waiting for Cosmos containers..."
          sleep 30
          docker compose -f .docker/test-nodes.yml ps

      - name: Test Tendermint
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-tendermint --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # ZCoin/Zombie tests - Zcash-based coin tests
  # Requires only Zombie node
  docker-tests-zcoin:
    name: Docker / ZCoin
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Start Zombie node
        run: |
          docker compose -f .docker/test-nodes.yml --profile zombie up -d
          echo "Waiting for Zombie container..."
          sleep 30
          docker compose -f .docker/test-nodes.yml ps

      - name: Test ZCoin
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-zcoin --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  # Cross-chain integration tests - swaps between different chain families
  # Tests: Tendermint<->ETH swaps, SLP cross-chain swaps
  # Requires ALL container types for multi-family cross-chain scenarios
  docker-tests-integration:
    name: Docker / Integration (Cross-chain)
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Fetch zcash params
        run: wget -O - https://raw.githubusercontent.com/KomodoPlatform/komodo/v0.8.1/zcutil/fetch-params-alt.sh | bash

      - name: Prepare docker test environment
        run: ./scripts/ci/docker-test-nodes-setup.sh

      - name: Start all docker nodes
        run: |
          docker compose -f .docker/test-nodes.yml --profile all up -d
          echo "Waiting for all containers to initialize..."
          sleep 45
          docker compose -f .docker/test-nodes.yml ps

      - name: Test cross-chain integration
        env:
          KDF_DOCKER_COMPOSE_ENV: "1"
        run: |
          cargo test --test 'docker_tests_main' --features docker-tests-integration --no-fail-fast

      - name: Stop docker nodes
        if: always()
        run: docker compose -f .docker/test-nodes.yml down -v

  wasm:
    name: WASM
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      BOB_PASSPHRASE: ${{ secrets.BOB_PASSPHRASE_LINUX }}
      BOB_USERPASS: ${{ secrets.BOB_USERPASS_LINUX }}
      ALICE_PASSPHRASE: ${{ secrets.ALICE_PASSPHRASE_LINUX }}
      ALICE_USERPASS: ${{ secrets.ALICE_USERPASS_LINUX }}
      TELEGRAM_API_KEY: ${{ secrets.TELEGRAM_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Install toolchain
        run: |
          rustup toolchain install stable --no-self-update --profile=minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install build deps
        uses: ./.github/actions/deps-install
        with:
          deps: ('protoc')

      - name: Install wasm-pack
        # Use the latest wasm-pack for up-to-date compatibility coverage on KDF.
        # As we don't share any build artifacts from this pipeline, we don't need
        # to lock the version here.
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Download geckodriver
        uses: ./.github/actions/download-and-verify
        with:
          url: "https://github.com/mozilla/geckodriver/releases/download/v0.32.2/geckodriver-v0.32.2-linux64.tar.gz"
          output_file: "geckodriver-v0.32.2-linux64.tar.gz"
          checksum: "1eab226bf009599f5aa1d77d9ed4c374e10a03fd848b500be1b32cefd2cbec64"

      - name: Install firefox and geckodriver
        run: |
          sudo apt-get update -y
          sudo apt-get install -y firefox
          sudo tar -xzvf geckodriver-v0.32.2-linux64.tar.gz -C /bin
          sudo chmod +x /bin/geckodriver

      - name: Build cache
        uses: ./.github/actions/build-cache

      - name: Test
        run: WASM_BINDGEN_TEST_TIMEOUT=1200 GECKODRIVER=/bin/geckodriver wasm-pack test --firefox --headless mm2src/mm2_main
